<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>탄막 피하기 웹게임</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="game-wrap">
    <section class="game-card">
      <header class="game-header">
        <div>
          <h1>탄막 피하기</h1>
          <p>마우스로 플레이어를 움직여 탄막을 피하세요.</p>
        </div>
        <div class="hud">
          <div class="hud-item">
            <span>TIME</span>
            <strong id="timeText">45.0</strong>
          </div>
          <div class="hud-item">
            <span>SCORE</span>
            <strong id="scoreText">0</strong>
          </div>
        </div>
      </header>

      <div class="canvas-box">
        <canvas id="gameCanvas" width="900" height="540"></canvas>

        <div id="startScreen" class="screen active">
          <h2>탄막을 피해서 살아남기</h2>
          <p>
            핵심 메커닉: 탄막 회피<br />
            승리 조건: 45초 생존<br />
            패배 조건: 탄막에 피격
          </p>
          <button id="startButton">게임 시작</button>
        </div>

        <div id="endScreen" class="screen">
          <h2 id="resultTitle">게임 종료</h2>
          <p id="resultText">결과가 표시됩니다.</p>
          <button id="restartButton">다시 시작</button>
        </div>
      </div>

      <footer class="game-footer">
        <p>조작: 마우스 이동 / 모바일: 손가락 드래그</p>
      </footer>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
