<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>탄막 피하기 웹게임</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="page-wrap">
    <section class="game-card">
      <header class="game-header">
        <div class="title-group">
          <p class="eyebrow">BULLET DODGE</p>
          <h1>탄막 피하기</h1>
          <p class="description">마우스로 플레이어를 움직여 탄막을 피하세요. 45초 동안 생존하면 승리합니다.</p>
        </div>

        <div class="hud" aria-label="게임 정보">
          <div class="hud-item">
            <span>TIME</span>
            <strong id="timeText">45.0</strong>
          </div>
          <div class="hud-item">
            <span>SCORE</span>
            <strong id="scoreText">0</strong>
          </div>
          <div class="hud-item">
            <span>GRAZE</span>
            <strong id="grazeText">0</strong>
          </div>
        </div>
      </header>

      <div class="content-grid">
        <section class="play-panel" aria-label="게임 플레이 영역">
          <div class="game-area" id="gameArea">
            <canvas id="gameCanvas" width="800" height="520" aria-label="탄막 피하기 게임 화면"></canvas>
            <div class="sound-indicator" id="soundIndicator">SOUND ON</div>

            <div class="overlay active" id="overlay">
              <div class="overlay-panel">
                <p class="panel-kicker" id="panelKicker">READY</p>
                <h2 id="panelTitle">탄막을 피해 생존하세요</h2>
                <p id="panelText">게임 시작 버튼을 누르면 사운드가 활성화됩니다. 탄막을 스치듯 피하면 Graze 점수를 얻습니다.</p>

                <form class="rank-form hidden" id="rankForm">
                  <label for="nicknameInput">닉네임을 입력하고 기록을 저장하세요.</label>
                  <div class="rank-input-row">
                    <input
                      type="text"
                      id="nicknameInput"
                      maxlength="12"
                      autocomplete="off"
                      placeholder="닉네임"
                    />
                    <button type="submit" id="saveRankButton">저장</button>
                  </div>
                  <p class="rank-help" id="rankHelp">점수 기준 상위 10개 기록만 저장됩니다.</p>
                </form>

                <div class="button-row">
                  <button type="button" id="startButton">게임 시작</button>
                  <button type="button" class="secondary" id="muteButton">사운드 끄기</button>
                </div>
              </div>
            </div>
          </div>

          <footer class="game-footer">
            <p><strong>조작:</strong> 마우스 이동</p>
            <p><strong>승리:</strong> 45초 생존</p>
            <p><strong>패배:</strong> 탄막 피격</p>
          </footer>
        </section>

        <aside class="ranking-panel" aria-label="랭킹 목록">
          <div class="ranking-header">
            <div>
              <p class="eyebrow">LOCAL LOG</p>
              <h2>TOP 10</h2>
            </div>
            <button type="button" class="ghost-button" id="clearRankingButton">초기화</button>
          </div>
          <ol class="ranking-list" id="rankingList"></ol>
          <p class="ranking-note">현재 브라우저에 저장되는 로컬 랭킹입니다.</p>
        </aside>
      </div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
