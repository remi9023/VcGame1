<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>탄막 피하기 웹게임</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="game-wrap">
    <section class="game-card">
      <header class="game-header">
        <div>
          <p class="eyebrow">BULLET DODGE</p>
          <h1>탄막 피하기</h1>
          <p class="description">마우스로 플레이어를 움직여 탄막을 피하세요. 45초 동안 생존하면 승리합니다.</p>
        </div>

        <div class="hud" aria-label="게임 정보">
          <div class="hud-item">
            <span>TIME</span>
            <strong id="timeText">45.0</strong>
          </div>
          <div class="hud-item">
            <span>SCORE</span>
            <strong id="scoreText">0</strong>
          </div>
          <div class="hud-item">
            <span>GRAZE</span>
            <strong id="grazeText">0</strong>
          </div>
        </div>
      </header>

      <div class="game-area" id="gameArea">
        <canvas id="gameCanvas" width="800" height="520" aria-label="탄막 피하기 게임 화면"></canvas>

        <div class="sound-indicator" id="soundIndicator">SOUND ON</div>

        <div class="overlay active" id="overlay">
          <div class="overlay-panel">
            <p class="panel-kicker" id="panelKicker">READY</p>
            <h2 id="panelTitle">탄막을 피해 생존하세요</h2>
            <p id="panelText">게임 시작 버튼을 누르면 사운드가 활성화됩니다. 탄막에 가까이 스치면 Graze 점수를 얻습니다.</p>
            <div class="button-row">
              <button type="button" id="startButton">게임 시작</button>
              <button type="button" class="secondary" id="muteButton">사운드 끄기</button>
            </div>
          </div>
        </div>
      </div>

      <footer class="game-footer">
        <p><strong>조작:</strong> 마우스 이동</p>
        <p><strong>승리:</strong> 45초 생존</p>
        <p><strong>패배:</strong> 탄막 피격</p>
      </footer>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
